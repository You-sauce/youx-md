<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU MD BOT • PAIRING INTERFACE</title>
    <link rel="icon" href="https://files.catbox.moe/rzbd7d.jpg" type="image/jpg">
    <!-- Fonts: Outfit (UI) & JetBrains Mono (Code) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050509;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #00f2ea;
            --primary-glow: rgba(0, 242, 234, 0.4);
            --error: #ff3b30;
            --success: #34c759;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Ambient Light */
        .ambient-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 234, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        #particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Main Card */
        .interface-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .title-group h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .title-group p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Status Bar */
        .system-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 10px var(--success);
        }
        
        #active-count {
            color: var(--primary);
            font-weight: bold;
        }

        /* Input Group */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: #0b0b10; 
            padding: 0 5px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            z-index: 2;
            border-radius: 4px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 20px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            outline: none;
            transition: 0.3s all;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 242, 234, 0.1);
            background: rgba(0, 242, 234, 0.02);
        }

        /* Button */
        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s all;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }
        
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loader / Result Area */
        .terminal-output {
            margin-top: 25px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .code-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .code-display:hover {
            text-shadow: 0 0 15px var(--primary);
            transform: scale(1.05);
        }

        .copy-hint {
            margin-top: 5px;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Custom Loader */
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { color: var(--error); font-size: 0.9rem; margin-top: 10px; display:flex; align-items:center; gap:8px; }

        /* Footer */
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #111;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 14px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    </style>
</head>
<body>

    <div class="ambient-light"></div>
    <canvas id="particles"></canvas>

    <div class="interface-card">
        <!-- Header -->
        <div class="header">
            <div class="logo-container">
                <img src="https://files.catbox.moe/ggt6bi.jpg" alt="Logo">
            </div>
            <div class="title-group">
                <h1>YOU MD V1</h1>
                <p>Automated System Interface</p>
            </div>
        </div>

        <!-- Status Bar with Active Users -->
        <div class="system-status">
            <div id="server-status"><span class="status-dot"></span>SYSTEM OPERATIONAL</div>
            <div id="active-count"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
        </div>

        <!-- Input Area -->
        <div class="input-wrapper">
            <span class="input-label">PHONE NUMBER</span>
            <input type="number" id="number" placeholder="56945031186" autocomplete="off">
        </div>

        <button class="action-btn" id="submit">
            <span>INITIALIZE PAIRING</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <!-- Result / Loader -->
        <div class="terminal-output" id="output">
            <!-- Dynamic Content Here -->
        </div>

        <div class="footer">
            MADE IN BY YOU TECHX
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"><i class="fa-solid fa-check-circle" style="color:var(--primary)"></i> Code copied to clipboard!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        // === 1. PARTICLES ANIMATION ===
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < 60; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 242, 234, ${0.1 - distance/1500})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        // === 2. ACTIVE USERS FETCH LOGIC ===
        const countDisplay = document.getElementById('active-count');

        async function fetchActiveUsers() {
            try {
                const response = await fetch('pair/active');
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                
                // Mise à jour de l'affichage
                countDisplay.innerHTML = `<i class="fa-solid fa-users"></i> ${data.count} ONLINE`;
                countDisplay.style.color = "var(--primary)";
            } catch (error) {
                console.error("Failed to fetch active count:", error);
                countDisplay.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> OFFLINE`;
                countDisplay.style.color = "var(--error)";
            }
        }

        // Update immediately then every 5 seconds
        fetchActiveUsers();
        setInterval(fetchActiveUsers, 5000);


        // === 3. PAIRING LOGIC ===
        const submitBtn = document.getElementById('submit');
        const outputDiv = document.getElementById('output');
        const numberInput = document.getElementById('number');

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        submitBtn.addEventListener('click', async () => {
            const number = numberInput.value.replace(/[^0-9]/g, "");

            if (!number) {
                outputDiv.innerHTML = `<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Please enter a valid number</div>`;
                return;
            }

            // Loading State
            outputDiv.innerHTML = `<div class="loader"></div><div style="margin-top:10px; font-size:0.8rem; color:#888; font-family:'JetBrains Mono'">GENERATING PAIRING KEYS...</div>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";

            try {
                const { data } = await axios.get(`/code?number=${number}`);
                
                if (data.code) {
                    const formattedCode = data.code.match(/.{1,4}/g).join('-');
                    outputDiv.innerHTML = `
                        <div class="code-display" onclick="copyCode('${data.code}')">
                            ${formattedCode}
                        </div>
                        <div class="copy-hint">CLICK TO COPY CODE</div>
                    `;
                } else if (data.status === 'already_connected') {
                    outputDiv.innerHTML = `<div style="color:var(--success); font-weight:bold; font-family:'JetBrains Mono'"><i class="fa-solid fa-link"></i> DEVICE ALREADY LINKED</div>`;
                } else {
                    outputDiv.innerHTML = `<div class="error-msg"><i class="fa-solid fa-xmark"></i> CONNECTION REFUSED</div>`;
                }
            } catch (e) {
                outputDiv.innerHTML = `<div class="error-msg"><i class="fa-solid fa-server"></i> SERVER TIMEOUT</div>`;
            }

            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
        });

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code);
            showToast();
        };

    </script>
</body>
    </html>
